# Environment (dev, test, prod)
app.environment=dev

# H2 (default for dev/test)
db.url=jdbc:h2:./quantity_measurement;AUTO_SERVER=TRUE
db.username=sa
db.password=
db.driver=org.h2.Driver

# Connection pool
db.pool.maxConnections=10
db.pool.minConnections=2
db.pool.connectionTimeout=30000

# Repository type: cache or database
app.repository.type=cache
